<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        header{
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav{
            background-color: #333;
            text-align: center;
            padding: 10px;
        }

        nav a{
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover{
            color: yellow;
        }

        .container{
            width: 80%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2{
            margin-bottom: 10px;
            color: #007bff;
        }

        p{
            margin-bottom: 15px;
            line-height: 1.6;
        }

        ul{
            margin-left: 20px;
            margin-bottom: 20px;
        }

        footer{
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>My First Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">

        <h2>About Me</h2>
        <p>
            Hello! My name is Praveen. I am learning HTML, CSS,
            JavaScript, and Python.
        </p>

        <h2>My Skills</h2>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>Python</li>
        </ul>

        <h2>Contact</h2>
        <p>Email: praveen@example.com</p>

    </div>

    <footer>
        <p>&copy; 2026 My First Website</p>
    </footer>

</body>
</html>
