<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background-color:#f0f8ff;
        }

        .card{
            width:350px;
            margin:50px auto;
            background-color:white;
            border:2px solid #333;
            border-radius:10px;
            padding:20px;
            text-align:center;
        }

        h1{
            color:darkblue;
        }

        img{
            width:120px;
            border-radius:50%;
        }

        p{
            font-size:18px;
        }

        button{
            background-color:blue;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkblue;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile">

        <h1>Praveen</h1>

        <p><strong>Course:</strong> CSE (AI & ML)</p>

        <p><strong>College:</strong> AMC Engineering College</p>

        <p>I am learning HTML, CSS, JavaScript, and Python.</p>

        <button>Contact Me</button>
    </div>

</body>
</html>
